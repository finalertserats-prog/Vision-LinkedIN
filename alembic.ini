# ---------------------------------------------------------------------------
# Alembic configuration for Project VISION.
#
# WHY: schema changes in prod (Postgres) go through versioned migrations, never
# through create_all(). The database URL is intentionally left blank here and
# injected at runtime from settings.DATABASE_URL (see migrations/env.py) so the
# real connection string / secret is never committed to this file.
# ---------------------------------------------------------------------------

[alembic]
# Location of migration scripts (relative to this file).
script_location = src/vision/db/migrations

# Template used for new revision filenames: date-prefixed for chronological sort.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for migration file timestamps.
timezone = UTC

# sqlalchemy.url is deliberately empty — env.py sets it from Settings at runtime.
sqlalchemy.url =

# --- Logging ---------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
