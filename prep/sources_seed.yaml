# Curated source seed for Project VISION (BRD §12.2). Loaded into the `sources` table.
# Config-over-code (§22): edit here / in the DB, never hard-code feeds.
# authority_weight: 0-1 trust weight used in scoring. enabled: toggle without code change.
# kind: rss | api | scrape. Feeds flagged `verify: true` should be health-checked on first run;
# feed-health tracking (sources.last_ok_at) disables persistently-dead feeds automatically.

hc_lane:
  - name: "STAT News"
    lane: hc
    kind: rss
    url: "https://www.statnews.com/feed/"
    authority_weight: 0.95
    enabled: true
